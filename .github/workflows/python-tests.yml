name: Greeting Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Pylint
      run: |
        python -m pip install --upgrade pip
        python -m pip install pylint

    - name: Run Pylint
      run: |
        python -m pylint greeter.py test_greet.py

    - name: Run tests
      run: |
        python -m unittest discover -p "test_greet.py"

    - name: Send failure mail
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        from: Github Actions <${{ secrets.EMAIL_USERNAME }}>
        subject: "Workflow Failed: ${{ github.repository }} - ${{ github.workflow }}"
        body: |
            The workflow "${{ github.workflow }}" in the repository "${{ github.repository }}" has failed on branch "${{ github.ref_name }}".
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Please check the details at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.
        to: ${{ secrets.EMAIL_RECIPIENT }}