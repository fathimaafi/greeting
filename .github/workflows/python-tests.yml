name: Greeting Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Pylint
      run: |
        python -m pip install --upgrade pip
        python -m pip install pylint

    - name: Run Pylint
      run: |
        python -m pylint greeter.py test_greet.py

    - name: Run tests
      run: |
        python -m unittest discover -p "test_greet.py"
