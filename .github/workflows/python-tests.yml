name: Greeting Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Pylint
      run: |
        python -m pip install --upgrade pip
        python -m pip install pylint pytest
        python -m pytest --version

    - name: Run Pylint
      id: pylint
      continue-on-error: true
      run: |
        python -m pylint greeter.py test_greet.py 2>&1 | tee pylint-results.txt
        echo "::set-output name=exit_code::$(echo ${PIPESTATUS[0]})

    - name: Run tests
      id: tests
      continue-on-error: true
      run: |
        python -m pytest test_greet.py 2>&1 | tee test-results.txt
        echo "::set-output name=exit_code::$(echo ${PIPESTATUS[0]})

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results.txt

    - name: Send failure mail
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        from: Github Actions <${{ secrets.EMAIL_USERNAME }}>
        to: ${{ secrets.EMAIL_RECIPIENT }}
        subject: "Workflow Failed: ${{ github.repository }} - ${{ github.workflow }}"
        body: |
            The workflow "${{ github.workflow }}" in the repository "${{ github.repository }}" has failed on branch "${{ github.ref_name }}".
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Please check the details at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.