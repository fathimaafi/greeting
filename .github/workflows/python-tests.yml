name: Greeting Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    -name: Install Pylint
      run: |
        python.exe -m pip install --upgrade pip
        pip install pylint

    -name: Run Pylint
      run: |
        pylint greeter.py test_greet.py
        
    - name: Run tests
      run: |
        python -m unittest discover -v greeter
