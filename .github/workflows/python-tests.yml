name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pytest
          python -m pytest --version

      - name: Run Pylint
        id: pylint
        run: |
          pylint greeter.py test_greet.py 2>&1 | tee pylint-results.txt; exit ${PIPESTATUS[0]}

      - name: Run tests
        id: tests
        run: |
          python -m pytest test_greet.py -v 2>&1 | tee test-results.txt; exit ${PIPESTATUS[0]}

      - name: Ensure test results file exists
        if: always()
        run: |
          touch test-results.txt
          if [ -f pylint-results.txt ]; then
            echo "=== PYLINT RESULTS ===" >> test-results.txt
            cat pylint-results.txt >> test-results.txt
          fi

      - name: Debug file location
        if: always()
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          find . -name 'test-results.txt'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ Workflow failed: ${{ github.repository }} - ${{ github.workflow }}"
          body: |
            The workflow "${{ github.workflow }}" failed on branch "${{ github.ref_name }}".

            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
