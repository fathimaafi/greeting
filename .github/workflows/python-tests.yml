name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run Pylint
        id: pylint
        if: always()
        working-directory: greeter
        continue-on-error: true
        run: |
          echo "=== PYLINT RESULTS ===" > test-results.txt
          pylint greeter.py test_greet.py >> test-results.txt 2>&1
          PYLINT_EXIT=$?
          if [ $PYLINT_EXIT -eq 0 ]; then
            echo "Pylint status: PASSED" >> test-results.txt
          else
            echo "Pylint status: FAILED (exit code: $PYLINT_EXIT)" >> test-results.txt
          fi
          echo $PYLINT_EXIT > pylint-exit-code.txt

      - name: Run tests
        id: tests
        if: always()
        working-directory: greeter
        continue-on-error: true
        run: |
          echo "" >> test-results.txt
          echo "=== TEST RESULTS ===" >> test-results.txt
          python -m unittest discover -s . -p test_greet.py -v >> test-results.txt 2>&1
          TEST_EXIT=$?
          if [ $TEST_EXIT -eq 0 ]; then
            echo "Test status: PASSED" >> test-results.txt
          else
            echo "Test status: FAILED (exit code: $TEST_EXIT)" >> test-results.txt
          fi
          echo $TEST_EXIT > test-exit-code.txt

      - name: Write overall status
        if: always()
        working-directory: greeter
        run: |
          PYLINT_EXIT=$(cat pylint-exit-code.txt 2>/dev/null || echo "1")
          TEST_EXIT=$(cat test-exit-code.txt 2>/dev/null || echo "1")
          echo "" >> test-results.txt
          echo "=== OVERALL STATUS ===" >> test-results.txt
          if [ "$PYLINT_EXIT" = "0" ] && [ "$TEST_EXIT" = "0" ]; then
            echo "Result: SUCCESS - All checks passed" >> test-results.txt
          else
            echo "Result: FAILED" >> test-results.txt
            [ "$PYLINT_EXIT" != "0" ] && echo "  - Pylint failed with exit code $PYLINT_EXIT" >> test-results.txt
            [ "$TEST_EXIT" != "0" ] && echo "  - Tests failed with exit code $TEST_EXIT" >> test-results.txt
          fi

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: My Artifact for test results
          path: greeter/test-results.txt
          if-no-files-found: error
          retention-days: 90

      - name: Fail job if Pylint or tests failed
        if: always()
        run: |
          PYLINT_EXIT=$(cat greeter/pylint-exit-code.txt 2>/dev/null || echo "1")
          TEST_EXIT=$(cat greeter/test-exit-code.txt 2>/dev/null || echo "1")
          if [ "$PYLINT_EXIT" != "0" ] || [ "$TEST_EXIT" != "0" ]; then
            echo "Job failed: Pylint exit=$PYLINT_EXIT, Test exit=$TEST_EXIT"
            exit 1
          fi

      - name: Send failure email
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ Workflow failed: ${{ github.repository }} - ${{ github.workflow }}"
          body: |
            The workflow "${{ github.workflow }}" failed on branch "${{ github.ref_name }}".

            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
