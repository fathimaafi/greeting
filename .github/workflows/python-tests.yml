name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run Pylint
        id: pylint
        if: always()
        run: |
          pylint greeter.py test_greet.py

      - name: Run tests
        id: tests
        if: always()
        run: |
          python -m unittest discover -s . -p test_greet.py -v > test-results.txt 2>&1; exit ${PIPESTATUS[0]}
      
      - name: Upload a Test results artifact
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: My Artifact for test results
          path: test-results.txt
          if-no-files-found: error
          retention-days: 90

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ Workflow failed: ${{ github.repository }} - ${{ github.workflow }}"
          body: |
            The workflow "${{ github.workflow }}" failed on branch "${{ github.ref_name }}".

            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
